<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>수영로교회 사랑방</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f4f8f5;min-height:100vh;padding-bottom:88px}
a{text-decoration:none;color:inherit}

/* ── 히어로 ── */
.hero{background:#1B4332;padding:40px 24px 28px}
.hero h1{font-size:28px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:6px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.5);font-weight:400}

/* ── 메인 CTA ── */
.main-cta{margin:20px 16px 0;display:block;background:#40916C;border-radius:20px;padding:28px 24px;color:#fff;position:relative;overflow:hidden;transition:transform .15s;box-shadow:0 6px 24px rgba(27,67,50,.25)}
.main-cta:active{transform:scale(.98)}
.cta-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#B7E4C7;margin-bottom:10px}
.cta-icon{font-size:44px;display:block;margin-bottom:10px}
.cta-title{font-size:28px;font-weight:900;line-height:1.1;margin-bottom:6px}
.cta-desc{font-size:13px;color:rgba(255,255,255,.7)}
.cta-arrow{position:absolute;right:24px;bottom:28px;font-size:36px;font-weight:900;color:rgba(255,255,255,.25)}

/* ── 보조 그리드 ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 0}
.gc{border-radius:16px;padding:18px 16px;display:flex;flex-direction:column;gap:6px;transition:transform .15s}
.gc:active{transform:scale(.97)}
.gc-icon{font-size:24px}
.gc-title{font-size:14px;font-weight:800;color:#1B4332}
.gc-desc{font-size:11px;color:#74856e;line-height:1.4}

.gc-report{background:#fff;border:1.5px solid #e0ebe0;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.gc-edu{background:#D8F3DC}
.gc-kit{background:#fff;border:1.5px solid #e0ebe0;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.gc-diag{background:#D8F3DC}

/* ── 하단 네비 ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8ede8;display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;font-size:10px;font-weight:600;color:#bbb;gap:3px}
.bottom-nav a.active{color:#1B4332}
.nav-icon{font-size:22px;line-height:1}
</style>
</head>
<body>

<div class="hero">
  <h1>사랑방이<br>교회입니다.</h1>
  <div class="hero-sub">수영로교회 사랑목자 온라인 키트</div>
</div>

<!-- 메인 CTA -->
<a class="main-cta" href="4w.html">
  <div class="cta-label">MEETING KIT</div>
  <span class="cta-icon">✨</span>
  <div class="cta-title">4W 키트</div>
  <div class="cta-desc">모임 전 바로 열기</div>
  <span class="cta-arrow">›</span>
</a>

<!-- 보조 카드 -->
<div class="grid">
  <a class="gc gc-report" href="https://script.google.com/macros/s/AKfycbwMJgooqxa044D014lFhZJIV8ypG0-ZBxWwDkfcx8561UPD6HIjJmc_N9IEGLieAYsayw/exec" target="_blank">
    <span class="gc-icon">📋</span>
    <div class="gc-title">사랑목자 보고서</div>
    <div class="gc-desc">주간 보고 작성</div>
  </a>
  <a class="gc gc-edu" href="education.html">
    <span class="gc-icon">📚</span>
    <div class="gc-title">교육 가이드</div>
    <div class="gc-desc">사랑방 운영 · 리더십</div>
  </a>
  <a class="gc gc-kit" href="kit.html">
    <span class="gc-icon">🛠</span>
    <div class="gc-title">도입 키트</div>
    <div class="gc-desc">서약서 · 심방가이드</div>
  </a>
  <a class="gc gc-diag" href="diagnosis.html">
    <span class="gc-icon">❤️</span>
    <div class="gc-title">건강진단</div>
    <div class="gc-desc">사랑방 12종 진단</div>
  </a>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="active">
    <span class="nav-icon">🏠</span>홈
  </a>
  <a href="4w.html">
    <span class="nav-icon">✨</span>4W 키트
  </a>
  <a href="education.html">
    <span class="nav-icon">📚</span>교육
  </a>
  <a href="report.html">
    <span class="nav-icon">📋</span>보고서
  </a>
  <a href="kit.html">
    <span class="nav-icon">🛠</span>도구
  </a>
</nav>

</body>
</html>
